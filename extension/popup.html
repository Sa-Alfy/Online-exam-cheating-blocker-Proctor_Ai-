<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctor AI - Exam Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body { 
            width: 320px; 
            padding: 20px; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            color: #1f2937;
        }

        h1 {
            margin: 0 0 5px 0;
            color: #111827; 
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .field { 
            margin-bottom: 16px; 
        }

        label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: #374151; 
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            width: 100%; 
            padding: 11px 12px; 
            border: 1.5px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s ease;
            background-color: #fafbfc;
        }

        input:hover {
            border-color: #9ca3af;
            background-color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background-color: #ffffff;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #ef4444;
        }

        input:invalid:not(:placeholder-shown) + .error {
            display: block;
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .error {
            display: none;
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        #toggleExamBtn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }

        #toggleExamBtn:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3);
        }

        #toggleExamBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            display: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 500;
        }

        .status-message.success {
            background-color: #d1fae5;
            color: #065f46;
            display: block;
        }

        .status-message.error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .status-message.loading {
            background-color: #eff6ff;
            color: #1e40af;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #1e40af;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            font-size: 0.8rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 16px;
            line-height: 1.4;
        }

        .footer-note strong {
            color: #6b7280;
            font-weight: 600;
        }

        @media (max-height: 400px) {
            body {
                padding: 16px;
                width: 300px;
            }

            h1 {
                font-size: 1.1rem;
            }
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1f2937;
                color: #f3f4f6;
            }

            h1 {
                color: #f9fafb;
            }

            h3 {
                color: #e5e7eb;
            }

            input {
                background-color: #374151;
                border-color: #4b5563;
                color: #f3f4f6;
            }

            input:focus {
                border-color: #818cf8;
                background-color: #4b5563;
            }

            .footer-note {
                color: #d1d5db;
            }
        }
    </style>
</head>
<body>
    <h1>Proctor AI</h1>
    <p class="subtitle">Secure Exam Monitoring</p>
    
    <div id="statusMessage" class="status-message"></div>

    <!-- Exam Session Control -->
    <div style="background: #f3f4f6; padding: 16px; border-radius: 8px; margin-bottom: 16px;">
        <div id="examStatus" style="font-size: 0.85rem; color: #6b7280; margin-bottom: 12px; text-align: center;">
            <span id="statusText">Offline</span>
        </div>
        
        <button 
            id="toggleExamBtn" 
            type="button"
        >
            ▶️ Start Exam
        </button>
        
        <div id="examInfo" style="margin-top: 12px; padding: 10px; background: white; border-radius: 6px; border: 1px solid #e5e7eb; font-size: 0.8rem; display: none;">
            <div style="margin-bottom: 6px;"><strong>Student:</strong> <span id="studentNameDisplay">-</span></div>
            <div><strong>Exam URL:</strong> <span id="examUrlDisplay">-</span></div>
        </div>
    </div>
    
    <div class="footer-note">
        <strong>🔴 Active Monitoring:</strong> <span id="monitoringStatus">Idle</span>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
