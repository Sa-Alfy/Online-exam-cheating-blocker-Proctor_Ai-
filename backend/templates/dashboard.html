<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proctor AI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Custom Dashboard Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<div class="container">
    <div class="card" id="report-content">
        <div class="header no-print">
            <div class="header-title">
                <h1>Proctor AI Dashboard</h1>
                <span class="badge">Session Monitor</span>
            </div>
            <div class="controls"> 
                <button class="btn btn-refresh" onclick="location.reload()" title="Refresh data">
                    🔄 Refresh
                </button>
                <button class="btn btn-pdf" onclick="downloadPDF()" title="Download PDF Report">
                    📄 Download PDF
                </button>
                <button class="btn btn-clear" onclick="clearData()" title="Delete all logs">
                    🗑️ Clear All
                </button>
            </div>
        </div>

        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">0</div>
                <div class="stat-label">Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalViolations">0</div>
                <div class="stat-label">Total Violations</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);">
                <div class="stat-value" id="totalStudents" style="color: #1e40af;">0</div>
                <div class="stat-label" style="color: #1e3a8a;">Students</div>
            </div>
        </div>

        <!-- Sessions Accordion -->
        <div id="sessionsContainer" class="sessions-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 12px;">Loading sessions...</p>
            </div>
        </div>
    </div>
</div>

    <script id="logsData" type="application/json">{{ logs | safe }}</script>
    <script>
    /**
     * Load session data from script tag
     */
    const logsScript = document.getElementById('logsData');
    const sessionData = logsScript ? JSON.parse(logsScript.textContent) : [];

    /**
     * Render dashboard with session accordion
     */
    function renderDashboard() {
        const container = document.getElementById('sessionsContainer');
        
        if (!sessionData || sessionData.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>No exam sessions recorded yet</p>
                    <p style="font-size: 0.85rem; margin-top: 8px;">Sessions will appear here when exams are started</p>
                </div>
            `;
            updateStats(0, 0, new Set());
            return;
        }

        // Calculate statistics
        let totalViolations = 0;
        const uniqueStudents = new Set();
        
        sessionData.forEach(session => {
            totalViolations += session.violations ? session.violations.length : 0;
            if (session.student_name) uniqueStudents.add(session.student_name);
        });

        updateStats(sessionData.length, totalViolations, uniqueStudents);

        // Render accordion sessions
        container.innerHTML = sessionData.map((session, index) => {
            const shortenedId = session.session_id.substring(0, 8).toUpperCase();
            const violationCount = session.violations ? session.violations.length : 0;
            const startTime = new Date(session.start_time).toLocaleString();
            const endTime = session.end_time ? new Date(session.end_time).toLocaleString() : 'In Progress';
            
            return `
                <div class="session-card">
                    <div class="session-header">
                        <div class="session-info">
                            <div class="session-title">
                                Session #${shortenedId}
                                <span class="session-badge">${violationCount} violations</span>
                            </div>
                            <div class="session-meta">
                                <span>📆 ${startTime}</span>
                                <span>👤 ${escapeHtml(session.student_name || 'Unknown')}</span>
                            </div>
                        </div>
                        <div class="session-toggle">▶</div>
                    </div>
                    <div class="session-content">
                        ${renderViolations(session.violations || [])}
                    </div>
                </div>
            `;
        }).join('');

        // Attach event listeners
        document.querySelectorAll('.session-header').forEach(header => {
            header.addEventListener('click', function(e) {
                if (e.target !== this && e.target.closest('a')) return;
                toggleSession(this);
            });
        });
    }

    /**
     * Toggle session expansion
     */
    function toggleSession(headerElement) {
        const isActive = headerElement.classList.contains('active');
        
        // Close all other sessions
        document.querySelectorAll('.session-header').forEach(h => {
            h.classList.remove('active');
            h.nextElementSibling.classList.remove('active');
            h.querySelector('.session-toggle').classList.remove('active');
        });

        // Toggle current session
        if (!isActive) {
            headerElement.classList.add('active');
            headerElement.nextElementSibling.classList.add('active');
            headerElement.querySelector('.session-toggle').classList.add('active');
        }
    }

    /**
     * Render violations for a session with table-like headers
     */
    function renderViolations(violations) {
        if (!violations || violations.length === 0) {
            return '<div class="empty-state" style="padding: 20px;"><p>No violations in this session</p></div>';
        }

        const rows = violations.map((violation, idx) => {
            // Handle both array format [type, timestamp, url] and object format
            const violationType = Array.isArray(violation) ? violation[0] : violation.type;
            const violationTime = Array.isArray(violation) ? violation[1] : violation.timestamp;
            const violationUrl = Array.isArray(violation) ? violation[2] : violation.url;
            
            const timeStr = new Date(violationTime).toLocaleTimeString();
            const dateStr = new Date(violationTime).toLocaleDateString();
            const typeStr = escapeHtml(violationType);
            const urlStr = escapeHtml(violationUrl);

            return `
                <div class="violation-row">
                    <div class="violation-type">⚠️ ${typeStr}</div>
                    <div class="violation-time">${dateStr} ${timeStr}</div>
                    <div class="violation-url" title="${urlStr}">🔗 ${urlStr}</div>
                </div>
            `;
        }).join('');

        const header = `
            <div class="violations-header">
                <div style="font-weight: 600; color: #374151;">Violation Type</div>
                <div style="font-weight: 600; color: #374151;">Timestamp</div>
                <div style="font-weight: 600; color: #374151;">Page URL</div>
            </div>
        `;

        return `<div class="violations-list">${header}${rows}</div>`;
    }

    /**
     * Update statistics
     */
    function updateStats(sessions, totalViolations, uniqueStudents) {
        document.getElementById('totalSessions').textContent = sessions;
        document.getElementById('totalViolations').textContent = totalViolations;
        document.getElementById('totalStudents').textContent = uniqueStudents.size;
    }

    /**
     * Escape HTML special characters
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    /**
     * Download as PDF
     */
    function downloadPDF() {
        const element = document.getElementById('report-content');
        const controls = document.querySelector('.controls');
        
        // Hide controls during PDF generation
        controls.style.display = 'none';

        // Expand all sessions temporarily for the PDF
        const previouslyActive = [];
        document.querySelectorAll('.session-header').forEach((h, index) => {
            if (h.classList.contains('active')) {
                previouslyActive.push(index);
            } else {
                h.classList.add('active');
                h.nextElementSibling.classList.add('active');
                h.querySelector('.session-toggle').classList.add('active');
            }
        });

        // Add a class to apply specific PDF rendering styles
        document.body.classList.add('pdf-generation-active');

        // Wait for accordion CSS animations (0.3s) before taking a snapshot
        setTimeout(() => {
            const options = {
                margin: [15, 10, 15, 10], // top, right, bottom, left
                filename: `Proctor_Report_${new Date().toLocaleDateString()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            html2pdf().set(options).from(element).save().then(() => {
                restorePDFForm();
            }).catch(err => {
                console.error('PDF generation error:', err);
                restorePDFForm();
                alert('Failed to generate PDF');
            });
        }, 400); // 400ms delay to ensure DOM has fully painted the expanded accordions
        
        function restorePDFForm() {
            document.body.classList.remove('pdf-generation-active');
            controls.style.display = 'flex';
            document.querySelectorAll('.session-header').forEach((h, index) => {
                if (!previouslyActive.includes(index)) {
                    h.classList.remove('active');
                    h.nextElementSibling.classList.remove('active');
                    h.querySelector('.session-toggle').classList.remove('active');
                }
            });
        }
    }

    /**
     * Clear all data with confirmation
     */
    function clearData() {
        if (confirm("Are you absolutely sure? This will permanently delete all violation records.")) {
            fetch('/clear', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => {
                if (res.ok) {
                    location.reload();
                } else {
                    alert('Failed to clear data');
                }
            })
            .catch(err => {
                console.error('Error clearing data:', err);
                alert('Error clearing data');
            });
        }
    }

    // Render on load
    document.addEventListener('DOMContentLoaded', renderDashboard);

    // Auto-refresh every 5 seconds by reloading page data
    setInterval(() => {
        fetch('/dashboard')
            .then(response => response.text())
            .then(html => {
                // Parse the new HTML to extract updated session data
                const parser = new DOMParser();
                const newDoc = parser.parseFromString(html, 'text/html');
                const newDataScript = newDoc.getElementById('logsData');
                if (newDataScript) {
                    const updatedData = JSON.parse(newDataScript.textContent);
                    if (JSON.stringify(updatedData) !== JSON.stringify(sessionData)) {
                        // Data has changed, update global and re-render
                        sessionData.length = 0;
                        updatedData.forEach(item => sessionData.push(item));
                        renderDashboard();
                    }
                }
            })
            .catch(err => {
                // Silent fail - dashboard already has current data
                console.debug('Auto-refresh skipped:', err.message);
            });
    }, 5000);
</script>

</body>
</html>
